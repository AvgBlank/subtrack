x-db-env: &db-env
  DATABASE_URL: ${DATABASE_URL}

services:
  db:
    profiles: ["localdb"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subtrack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 5
    networks:
      - subtrack

  migrate:
    depends_on:
      db:
        condition: service_healthy
        required: false
    profiles: ["migrate"]
    image: ghcr.io/avgblank/subtrack-api:latest
    command: "bun run db:migrate:deploy"
    environment:
      <<: *db-env
    networks:
      - subtrack

  seed:
    depends_on:
      migrate:
        condition: service_completed_successfully
        required: false
      db:
        condition: service_healthy
        required: false
    profiles: ["seed"]
    image: ghcr.io/avgblank/subtrack-api:latest
    command: "bun run db:seed"
    environment:
      <<: *db-env
    networks:
      - subtrack

  api:
    image: ghcr.io/avgblank/subtrack-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      APP_ORIGIN: ${APP_ORIGIN}
      # Auth
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      # DB
      <<: *db-env
    healthcheck:
      test: ["CMD-SHELL", "bun run healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api/`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.priority=10"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
    networks:
      - subtrack

  web:
    image: ghcr.io/avgblank/subtrack-web:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.routers.web.priority=1"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    networks:
      - subtrack

  traefik:
    image: traefik:v3
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=subtrack"
      - "--entrypoints.web.address=:80"
      - "--log=true"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - subtrack

volumes:
  postgres_data: null
networks:
  subtrack:
    driver: bridge
    name: subtrack
